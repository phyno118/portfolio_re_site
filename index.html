<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGV 리뉴얼 - 포트폴리오 프로토타입</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    /* 1. 디자인 시스템 & 베리어블 (Design Tokens) */
    :root {
      /* Color Tokens (Dark Mode Base) */
      --cgv-red: #FF243E;
      --cgv-red-hover: #E51A32;
      --bg-primary: #121212;
      --bg-secondary: #1E1E1E;
      --text-primary: #F8F9FA;
      --text-secondary: #A0A0A0;
      
      /* Seat Colors */
      --seat-available: #333333;
      --seat-selected: var(--cgv-red);
      --seat-soldout: #1A1A1A;

      /* Spacing System */
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 48px;
    }

    /* 기본 리셋 및 레이아웃 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* 헤더 UI */
    header {
      display: flex;
      justify-content: space-between;
      align-content: center;
      padding: var(--space-lg) 5%;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(18,18,18,0.9), transparent);
    }
    .logo { font-size: 24px; font-weight: 800; color: var(--cgv-red); letter-spacing: -1px; }
    .nav-utils { display: flex; gap: var(--space-md); cursor: pointer; }

    /* 메인 히어로 섹션 (시네마틱 스크롤 대상) */
    .hero-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 5%;
      background: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
      position: relative;
    }
    .hero-section::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg-primary), transparent 60%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }
    .hero-content h1 { font-size: 3.5rem; margin-bottom: var(--space-sm); }
    .hero-content p { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: var(--space-xl); }
    
    /* 버튼 컴포넌트 */
    .btn {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background-color: var(--cgv-red);
      color: white;
    }
    .btn-primary:hover { background-color: var(--cgv-red-hover); transform: translateY(-2px); }

    /* 2. 몰입형 예매 모달 (뺄셈의 미학 적용) */
    .booking-overlay {
      position: fixed;
      inset: 0;
      background-color: var(--bg-primary);
      z-index: 100;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .booking-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    .booking-header {
      display: flex;
      justify-content: space-between;
      padding: var(--space-lg) 5%;
      border-bottom: 1px solid var(--bg-secondary);
    }
    .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

    /* 3. CSS Grid 좌석 선택 UI */
    .seat-selection-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
    }
    .screen {
      width: 100%;
      max-width: 600px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
      border-top: 4px solid var(--text-secondary);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      margin-bottom: var(--space-xl);
      text-align: center;
      color: var(--text-secondary);
      line-height: 40px;
      font-weight: bold;
      letter-spacing: 10px;
    }
    .seat-map {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
    }
    .seat {
      width: 30px;
      height: 30px;
      background-color: var(--seat-available);
      border-radius: 4px 4px 8px 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .seat:hover:not(.soldout) { background-color: #555; transform: scale(1.1); }
    .seat.selected { background-color: var(--seat-selected); box-shadow: 0 0 10px rgba(255,36,62,0.5); }
    .seat.soldout { background-color: var(--seat-soldout); cursor: not-allowed; opacity: 0.3; }
    
    /* 복도 구현 (3번째, 10번째 열 뒤에 여백) */
    .seat:nth-child(12n + 3), .seat:nth-child(12n + 9) {
      margin-right: var(--space-lg);
    }

    .booking-footer {
      padding: var(--space-lg) 5%;
      background-color: var(--bg-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">CGV</div>
    <div class="nav-utils">🔍 검색</div>
  </header>

  <section class="hero-section">
    <div class="hero-content">
      <h1 class="gsap-title">듄: 파트 2</h1>
      <p class="gsap-desc">IMAX 예매율 1위 | 절찬 상영중</p>
      <button class="btn btn-primary gsap-btn" id="openBookingBtn">예매하기 (몰입 모드)</button>
    </div>
  </section>

  <div class="booking-overlay" id="bookingModal">
    <div class="booking-header">
      <h2>좌석 선택</h2>
      <button class="close-btn" id="closeBookingBtn">✕</button>
    </div>
    
    <div class="seat-selection-container">
      <div class="screen">SCREEN</div>
      <div class="seat-map" id="seatMap">
        </div>
    </div>

    <div class="booking-footer">
      <div>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">선택된 좌석</p>
        <h3 id="selectedSeatsText">-</h3>
      </div>
      <button class="btn btn-primary" id="paymentBtn" style="opacity: 0.5; cursor: not-allowed;">결제하기</button>
    </div>
  </div>

  <script>
    // 1. GSAP 시네마틱 등장 애니메이션
    gsap.registerPlugin(ScrollTrigger);
    
    gsap.from(".gsap-title", { opacity: 0, y: 30, duration: 1, delay: 0.2 });
    gsap.from(".gsap-desc", { opacity: 0, y: 30, duration: 1, delay: 0.4 });
    gsap.from(".gsap-btn", { opacity: 0, y: 30, duration: 1, delay: 0.6 });

    // 배경 패럴랙스 스크롤 효과
    gsap.to(".hero-section", {
      backgroundPosition: "50% 100%",
      ease: "none",
      scrollTrigger: {
        trigger: ".hero-section",
        start: "top top",
        end: "bottom top",
        scrub: true
      }
    });

    // 2. 몰입형 예매 모달 제어 (인지적 과부하 방지)
    const openBtn = document.getElementById('openBookingBtn');
    const closeBtn = document.getElementById('closeBookingBtn');
    const modal = document.getElementById('bookingModal');

    openBtn.addEventListener('click', () => {
      modal.classList.add('active');
      // 모달 열릴 때 좌석 맵 애니메이션
      gsap.fromTo(".seat", 
        { opacity: 0, scale: 0.5 }, 
        { opacity: 1, scale: 1, duration: 0.4, stagger: 0.01, ease: "back.out(1.7)" }
      );
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    // 3. 좌석 생성 및 인터랙션 로직 (결정 피로 최소화)
    const seatMap = document.getElementById('seatMap');
    const selectedSeatsText = document.getElementById('selectedSeatsText');
    const paymentBtn = document.getElementById('paymentBtn');
    const totalRows = 6;
    const seatsPerRow = 12;
    let selectedSeats = [];

    // 가상의 좌석 데이터 생성
    for (let r = 0; r < totalRows; r++) {
      for (let c = 0; c < seatsPerRow; c++) {
        const seat = document.createElement('div');
        seat.classList.add('seat');
        
        // 랜덤으로 예매 완료(soldout) 좌석 생성
        if (Math.random() < 0.2) {
          seat.classList.add('soldout');
        } else {
          // 클릭 이벤트 추가
          seat.addEventListener('click', () => toggleSeat(seat, r, c));
        }
        seatMap.appendChild(seat);
      }
    }

    // 좌석 선택/해제 함수
    function toggleSeat(seatElement, row, col) {
      const seatId = `${String.fromCharCode(65 + row)}${col + 1}`; // 예: A1, B4
      
      if (seatElement.classList.contains('selected')) {
        seatElement.classList.remove('selected');
        selectedSeats = selectedSeats.filter(id => id !== seatId);
      } else {
        if(selectedSeats.length >= 4) {
          alert("최대 4석까지만 선택 가능합니다.");
          return;
        }
        seatElement.classList.add('selected');
        selectedSeats.push(seatId);
      }
      updateFooter();
    }

    // 하단 결제 정보 업데이트
    function updateFooter() {
      if (selectedSeats.length > 0) {
        selectedSeatsText.textContent = selectedSeats.join(', ');
        paymentBtn.style.opacity = '1';
        paymentBtn.style.cursor = 'pointer';
        paymentBtn.textContent = `${selectedSeats.length * 15000}원 결제하기`;
      } else {
        selectedSeatsText.textContent = '-';
        paymentBtn.style.opacity = '0.5';
        paymentBtn.style.cursor = 'not-allowed';
        paymentBtn.textContent = '결제하기';
      }
    }
  </script>
</body>
</html>
