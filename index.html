<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGV UX/UI Redesign Prototype</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    /* =========================================
       1. Design System & Tokens
       ========================================= */
    :root {
      /* Colors - Dark Mode Optimized */
      --color-brand: #FA2A3E;
      --color-brand-hover: #D91D2F;
      --bg-base: #111111;
      --bg-surface: #1C1C1C;
      --bg-surface-elevated: #2A2A2A;
      
      --text-primary: #F5F5F5;
      --text-secondary: #A0A0A0;
      --text-disabled: #555555;
      
      /* Seat States */
      --seat-available: #333333;
      --seat-selected: var(--color-brand);
      --seat-soldout: #111111;
      --seat-border: #444444;

      /* Spacing & Layout */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 40px;
      
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      
      --nav-height: 72px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================
       2. Global Components
       ========================================= */
    .btn {
      padding: 16px 32px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background-color: var(--color-brand);
      color: #FFF;
      box-shadow: 0 4px 14px rgba(250, 42, 62, 0.3);
    }
    .btn-primary:hover:not(:disabled) {
      background-color: var(--color-brand-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(250, 42, 62, 0.4);
    }
    .btn:disabled {
      background-color: var(--bg-surface-elevated);
      color: var(--text-disabled);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* =========================================
       3. Main Layout & Hero (GSAP ScrollTrigger)
       ========================================= */
    header {
      position: fixed;
      top: 0; width: 100%;
      height: var(--nav-height);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5%;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(17,17,17,0.9), transparent);
      backdrop-filter: blur(4px);
    }
    .logo { font-size: 28px; font-weight: 900; color: var(--color-brand); letter-spacing: -1px; }
    .nav-utils { display: flex; gap: var(--space-lg); font-weight: 500; cursor: pointer; color: var(--text-primary); }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10% 5%;
      background: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, var(--bg-base) 0%, rgba(17,17,17,0.4) 50%, rgba(17,17,17,0.1) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin-bottom: var(--space-xl);
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: var(--space-md);
      backdrop-filter: blur(4px);
    }
    .hero h1 { font-size: 4rem; font-weight: 800; line-height: 1.1; margin-bottom: var(--space-md); letter-spacing: -1px; }
    .hero p { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: var(--space-xl); font-weight: 300; }

    /* =========================================
       4. Immersive Booking Flow (뺄셈의 미학 UX)
       ========================================= */
    .booking-modal {
      position: fixed;
      inset: 0;
      background-color: var(--bg-base);
      z-index: 100;
      display: flex;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s;
    }
    .booking-modal.is-open {
      opacity: 1;
      visibility: visible;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-lg) 5%;
      border-bottom: 1px solid var(--bg-surface);
      background-color: var(--bg-base);
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 600; }
    .close-btn { 
      background: none; border: none; color: var(--text-secondary); 
      font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
    }
    .close-btn:hover { color: var(--text-primary); }

    /* Seat Map Layout */
    .booking-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-xl) 5%;
      overflow-y: auto;
    }

    /* Screen UI */
    .cinema-screen {
      width: 100%;
      max-width: 600px;
      height: 60px;
      margin-bottom: 60px;
      position: relative;
      text-align: center;
    }
    .cinema-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100%;
      border-top: 4px solid var(--text-disabled);
      border-radius: 50% / 100% 100% 0 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
    }
    .cinema-screen span {
      position: relative;
      top: 20px;
      color: var(--text-disabled);
      letter-spacing: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Seat Grid System (복도 포함) */
    .seat-grid {
      display: grid;
      grid-template-columns: repeat(14, minmax(28px, 1fr));
      gap: 10px;
      margin-bottom: var(--space-xl);
    }
    /* 4번째, 11번째 좌석 다음에 복도(Aisle) 생성 */
    .seat-grid > div:nth-child(14n + 4),
    .seat-grid > div:nth-child(14n + 10) {
      margin-right: 24px;
    }

    .seat {
      aspect-ratio: 1 / 1;
      background-color: var(--seat-available);
      border: 1px solid var(--seat-border);
      border-radius: 6px 6px 4px 4px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    /* 머리받침 디테일 */
    .seat::before {
      content: '';
      position: absolute;
      top: -3px; left: 15%; right: 15%;
      height: 6px;
      background-color: inherit;
      border-radius: 4px;
      opacity: 0.8;
    }
    .seat:hover:not(.soldout) {
      background-color: #555;
      transform: translateY(-2px);
    }
    .seat.selected {
      background-color: var(--seat-selected);
      border-color: var(--color-brand);
    }
    .seat.soldout {
      background-color: var(--seat-soldout);
      border-color: #222;
      cursor: not-allowed;
      opacity: 0.5;
    }
    .seat.soldout::after {
      content: '✕';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #444;
    }

    /* Legend (범례) */
    .seat-legend {
      display: flex;
      gap: var(--space-lg);
      margin-top: var(--space-md);
      padding-top: var(--space-xl);
      border-top: 1px solid var(--bg-surface);
      width: 100%;
      max-width: 600px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .legend-box {
      width: 16px; height: 16px;
      border-radius: 3px;
    }

    /* Footer / 결제 영역 */
    .modal-footer {
      padding: var(--space-md) 5%;
      background-color: var(--bg-surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--bg-surface-elevated);
    }
    .booking-info { display: flex; flex-direction: column; }
    .booking-info span { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2px; }
    .booking-info strong { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }

  </style>
</head>
<body>

  <header>
    <div class="logo">CGV</div>
    <div class="nav-utils">
      <span>로그인</span>
      <span>☰</span>
    </div>
  </header>

  <main class="hero">
    <div class="hero-content">
      <div class="badge gs-reveal">IMAX 예매율 1위</div>
      <h1 class="gs-reveal">듄: 파트 2</h1>
      <p class="gs-reveal">운명을 거스르는 자, 새로운 전설이 된다.<br>가장 완벽한 시네마틱 경험을 지금 예매하세요.</p>
      <button class="btn btn-primary gs-reveal" id="btnOpenBooking">빠른 예매 시작하기</button>
    </div>
  </main>

  <div class="booking-modal" id="bookingModal">
    <div class="modal-header">
      <h2>좌석 선택 <span style="color:var(--text-secondary); font-weight:400; font-size:0.9rem; margin-left:8px;">용산아이파크몰 IMAX관</span></h2>
      <button class="close-btn" id="btnCloseBooking">✕</button>
    </div>
    
    <div class="booking-body">
      <div class="cinema-screen"><span>SCREEN</span></div>
      
      <div class="seat-grid" id="seatGrid"></div>
      
      <div class="seat-legend">
        <div class="legend-item"><div class="legend-box" style="background:var(--seat-available); border:1px solid var(--seat-border);"></div> 선택 가능</div>
        <div class="legend-item"><div class="legend-box" style="background:var(--seat-selected);"></div> 선택됨</div>
        <div class="legend-item"><div class="legend-box" style="background:var(--seat-soldout); border:1px solid #222;"></div> 예매 완료</div>
      </div>
    </div>

    <div class="modal-footer">
      <div class="booking-info">
        <span>선택된 좌석 (최대 4석)</span>
        <strong id="txtSelectedSeats">좌석을 선택해주세요</strong>
      </div>
      <button class="btn btn-primary" id="btnPayment" disabled>결제하기</button>
    </div>
  </div>

  <script>
    // =========================================
    // 1. GSAP 메인 애니메이션
    // =========================================
    gsap.registerPlugin(ScrollTrigger);
    
    // 텍스트 및 버튼 부드러운 순차 등장
    gsap.from(".gs-reveal", { 
      opacity: 0, 
      y: 30, 
      duration: 1, 
      stagger: 0.15, 
      ease: "power3.out",
      delay: 0.2
    });

    // 배경 패럴랙스 (스크롤 시 살짝 올라가는 효과)
    gsap.to(".hero", {
      backgroundPosition: "50% 80%",
      ease: "none",
      scrollTrigger: {
        trigger: ".hero",
        start: "top top",
        end: "bottom top",
        scrub: true
      }
    });

    // =========================================
    // 2. 예매 모달 및 좌석 로직 구현
    // =========================================
    const modal = document.getElementById('bookingModal');
    const seatGrid = document.getElementById('seatGrid');
    const txtSelectedSeats = document.getElementById('txtSelectedSeats');
    const btnPayment = document.getElementById('btnPayment');
    
    const TICKET_PRICE = 15000;
    const MAX_SEATS = 4;
    let selectedSeats = [];

    // 좌석 데이터 생성 (총 8열, 한 열당 14석)
    const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
    const seatsPerRow = 14;

    function initSeats() {
      seatGrid.innerHTML = '';
      rows.forEach((row) => {
        for (let i = 1; i <= seatsPerRow; i++) {
          const seat = document.createElement('div');
          seat.className = 'seat';
          const seatId = `${row}${i}`;
          
          // 랜덤으로 15% 확률로 예매 완료 좌석 생성
          if (Math.random() < 0.15) {
            seat.classList.add('soldout');
          } else {
            // 클릭 이벤트 바인딩
            seat.addEventListener('click', () => handleSeatClick(seat, seatId));
          }
          seatGrid.appendChild(seat);
        }
      });
    }

    function handleSeatClick(seatElement, seatId) {
      const isSelected = seatElement.classList.contains('selected');

      if (isSelected) {
        seatElement.classList.remove('selected');
        selectedSeats = selectedSeats.filter(id => id !== seatId);
      } else {
        if (selectedSeats.length >= MAX_SEATS) {
          // 경고 애니메이션 (버튼 흔들기)
          gsap.fromTo(seatElement, 
            { x: -5 }, { x: 5, duration: 0.05, yoyo: true, repeat: 5, clearProps: "x" }
          );
          return;
        }
        seatElement.classList.add('selected');
        selectedSeats.push(seatId);
        
        // 선택 팝업 효과
        gsap.fromTo(seatElement, { scale: 0.8 }, { scale: 1, duration: 0.3, ease: "back.out(2)" });
      }
      updateFooterUI();
    }

    function updateFooterUI() {
      // 좌석 정렬하여 표시 (A1, A2 순)
      selectedSeats.sort((a, b) => {
        if(a[0] !== b[0]) return a.charCodeAt(0) - b.charCodeAt(0);
        return parseInt(a.slice(1)) - parseInt(b.slice(1));
      });

      if (selectedSeats.length > 0) {
        txtSelectedSeats.textContent = selectedSeats.join(', ');
        const totalPrice = (selectedSeats.length * TICKET_PRICE).toLocaleString();
        btnPayment.textContent = `${totalPrice}원 결제하기`;
        btnPayment.disabled = false;
      } else {
        txtSelectedSeats.textContent = '좌석을 선택해주세요';
        btnPayment.textContent = '결제하기';
        btnPayment.disabled = true;
      }
    }

    // 모달 열기/닫기 제어
    document.getElementById('btnOpenBooking').addEventListener('click', () => {
      initSeats(); // 열 때마다 초기화 (데모용)
      selectedSeats = [];
      updateFooterUI();
      
      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden'; // 뒤쪽 스크롤 방지

      // 좌석 스르륵 나타나는 애니메이션 (GSAP Stagger)
      gsap.fromTo(".seat", 
        { opacity: 0, scale: 0.5, y: 10 }, 
        { opacity: 1, scale: 1, y: 0, duration: 0.4, stagger: 0.005, ease: "power2.out", delay: 0.1 }
      );
    });

    document.getElementById('btnCloseBooking').addEventListener('click', () => {
      modal.classList.remove('is-open');
      document.body.style.overflow = '';
    });
  </script>
</body>
</html>
